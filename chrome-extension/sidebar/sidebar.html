<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchParty Chat</title>
    <link rel="stylesheet" href="sidebar.css">
</head>

<body>
    <div id="chat-container">
        <div id="chat-header">
            <div class="chat-title-group">
                <span>FluxParty</span>
                <span id="participant-count" class="participant-count">
                    1 <span class="participant-icon">👤</span>
                </span>
            </div>
            <button id="room-badge" class="btn-copy-code" title="Click to copy Room Code">
                Connecting...
            </button>
        </div>

        <ul id="chat-messages">
            <!-- JavaScript will inject chat bubbles here -->
        </ul>

        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" />
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="sidebar.js"></script>
</body>

</html>
