<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="popup.css">

</head>

<body>
    <h1>FluxParty</h1>

    <!-- View 1: When you are NOT in a party -->
    <div id="join-view">
        <button id="create-btn">Create Room</button>
        <div class="flex-row join-input-row">
            <input type="text" id="room-input" placeholder="Enter Room ID" />
            <button id="join-btn">Join</button>
        </div>
        <p id="status"></p>
    </div>

    <!-- View 2: When you ARE in a party -->
    <div id="management-view">
        <h2>Party Management</h2>
        <p class="connected-label">You are connected to:</p>
        <p class="room-id-container"><strong id="current-room-id">...</strong></p>

        <button id="copy-link-btn" class="secondary-btn">Copy Room Code</button>
        <p id="copy-status"></p>
        
        <div class="flex-row">
            <button id="toggle-chat-btn" class="secondary-btn">Toggle Chat</button>
            <button id="disconnect-btn" class="danger-btn">Disconnect</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
